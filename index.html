<style>
/* ══ DESIGN SYSTEM TOKENS ══════════════════════════════════════════ */
:root{
  --ink:#1A2230;
  --navy:#0E1B2A; /* DesignSystem primary anchor — small only (label/line/heading), never a dark block */
  --accent:#2C7DFF;
  --accent-dark:#1B5FCC;
  --ice1:#EAF1FB;
  --ice2:#F4F8FE;
  --border:#D8E2EF;
  --border-h:#B8CDE0;
  --muted:#5A6B7E;
  --subtle:#8A9AB0;
  --white:#FFFFFF;
  --accent-dim:rgba(44,125,255,.1);
  --accent-rim:rgba(44,125,255,.25);
  --r:9px;--r-lg:14px;
  --mono:'Courier New',monospace;
  --sans:Aptos,Arial,sans-serif;
}

/* ══ OPEN (pre-login) DISCOVERY LAYER ═══════════════════════════════ */
/* Canon: not a website — a calm invitation into the discovery conversation.
   Light palette only, no navy block. Stops after the six chips + the Atlas footer. */
.open{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:48px 20px;}
.open-inner{width:100%;max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:26px;}
.open-brand{text-align:center;}
.wordmark{font-size:1.9rem;font-weight:400;letter-spacing:-.02em;color:var(--ink);user-select:none;}
.wordmark .s{color:var(--accent);font-weight:700;} /* wordmark "S" accent (canonical) */
.tagline{margin-top:10px;font-size:1.05rem;line-height:1.6;color:var(--muted);font-weight:300;}
.ai-disclosure{font-family:var(--mono);font-size:9.5px;color:var(--subtle);letter-spacing:.04em;line-height:1.5;}
.ret-disclosure{font-family:var(--mono);font-size:9.5px;color:var(--subtle);margin:2px 20px 0;}
.open-footer{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--white);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img,svg{display:block;max-width:100%;}a{color:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--ice2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}html{scroll-behavior:auto;}}

/* ══ TYPE ═════════════════════════════════════════════════════════ */
.display{font-size:clamp(2.4rem,6vw,4.8rem);font-weight:300;letter-spacing:-.03em;line-height:1.08;}
.display strong{font-weight:600;}
.section-title{font-size:clamp(1.55rem,3.2vw,2.25rem);font-weight:300;letter-spacing:-.022em;line-height:1.2;margin-bottom:14px;}
.section-title strong{font-weight:600;}
.label{font-family:var(--mono);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--navy);}
.body-lg{font-size:1.05rem;line-height:1.72;color:var(--muted);font-weight:300;}
.body-sm{font-size:.875rem;line-height:1.6;color:var(--muted);}

/* ══ LAYOUT ═══════════════════════════════════════════════════════ */
.container{max-width:1080px;margin:0 auto;padding:0 20px;}
section{position:relative;z-index:1;}
.section{padding:88px 0;}
@media(max-width:768px){.section{padding:60px 0;}}
@media(max-width:480px){.section{padding:48px 0;}.container{padding:0 16px;}}
.divider{height:1px;background:var(--border);}

/* ══ NAV ══════════════════════════════════════════════════════════ */
nav{position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid transparent;transition:background .25s,border-color .25s;}
nav.scrolled{background:rgba(255,255,255,.95);border-color:var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:1.28rem;font-weight:400;letter-spacing:-.02em;text-decoration:none;color:var(--ink);user-select:none;}
.nav-logo .s{color:var(--accent);font-weight:700;font-size:1.48rem;}
.nav-cta{background:var(--accent)!important;color:#fff!important;padding:7px 15px!important;border-radius:7px;font-weight:500!important;font-size:.825rem!important;transition:background .18s!important;text-decoration:none;}
.nav-cta:hover{background:var(--accent-dark)!important;}

/* ══ HERO ═════════════════════════════════════════════════════════ */
.hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding-top:80px;padding-bottom:64px;position:relative;overflow:hidden;}
@media(max-width:480px){.hero{min-height:auto;padding-top:96px;padding-bottom:56px;}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 70% 55% at 50% 40%,black 20%,transparent 75%);animation:gridDrift 24s linear infinite;}
@keyframes gridDrift{0%{background-position:0 0;}100%{background-position:56px 56px;}}
.hero-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(ellipse,rgba(44,125,255,.07) 0%,transparent 65%);top:-80px;left:50%;transform:translateX(-50%);pointer-events:none;animation:orbBreath 7s ease-in-out infinite;}
@keyframes orbBreath{0%,100%{opacity:.6;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.06);}}
.hero-content{position:relative;z-index:2;max-width:780px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;margin-bottom:24px;padding:4px 12px 4px 5px;background:var(--ice1);border:1px solid var(--accent-rim);border-radius:100px;}
.eyebrow-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dotBlink 2.5s ease-in-out infinite;}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:.25;}}
.hero-eyebrow span{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;}
.hero-title{margin-bottom:20px;animation:fadeUp .7s ease both;animation-delay:.08s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
.hero-sub{font-size:clamp(.95rem,1.8vw,1.1rem);line-height:1.7;color:var(--muted);font-weight:300;max-width:520px;margin-bottom:36px;animation:fadeUp .7s ease both;animation-delay:.18s;}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px;animation:fadeUp .7s ease both;animation-delay:.28s;}

/* ══ BUTTONS ══════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:var(--r);font-family:var(--sans);font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;border:none;transition:all .18s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn-blue{background:var(--accent);color:#fff;}
.btn-blue:hover{background:var(--accent-dark);transform:translateY(-1px);}
.btn-blue:active{transform:none;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-h);color:var(--ink);}
@media(max-width:400px){.btn{width:100%;justify-content:center;}}

/* ══ SECTION LABEL ════════════════════════════════════════════════ */
.section-label{display:flex;align-items:center;gap:8px;margin-bottom:14px;}

/* ══════════════════════════════════════════════════════════════════
   AI SPARRING SECTION
══════════════════════════════════════════════════════════════════ */
.sparring-section{background:var(--ice2);}

/* Workspace container */
.sparring-workspace{
  margin-top:44px;
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  background:var(--white);
  transition:border-color .3s;
}
.sparring-workspace.active{border-color:var(--accent-rim);}

/* Workspace header */
.sparring-header{
  background:var(--ice2);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.sparring-header-left{display:flex;align-items:center;gap:10px;}
.sparring-ai-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px rgba(44,125,255,.4);
  animation:dotBlink 3s ease-in-out infinite;
  flex-shrink:0;
}
.sparring-ai-label{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.06em;}
.sparring-ai-label strong{color:var(--ink);font-weight:500;}
.sparring-ai-label .s{color:var(--accent);font-weight:700;} /* wordmark "S" accent (canonical) */

/* Prompt chips */
.sparring-prompts{
  padding:18px 20px;border-bottom:1px solid var(--border);
  background:var(--white);
}
.sparring-prompts-label{
  font-family:var(--mono);font-size:10px;color:var(--subtle);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.sparring-chips{display:flex;flex-wrap:wrap;gap:8px;}
.sparring-chip{
  padding:8px 14px;
  /* Light-blue (same ICE value as the removed hero pill): soft background + rim,
     not a solid fill — kept visually subordinate to the accent send button. */
  background:var(--ice1);
  border:1px solid var(--accent-rim);
  border-radius:100px;
  font-size:.825rem;color:var(--muted);
  cursor:pointer;
  transition:all .18s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  font-family:var(--sans);
}
.sparring-chip:hover{
  border-color:#B5D4F4; /* spec hover-border */
  color:var(--ink);
  background:var(--ice1);
}
.sparring-chip:active{transform:scale(.97);}
@media(max-width:480px){.sparring-chips{gap:6px;}.sparring-chip{font-size:.775rem;padding:7px 12px;}}

/* Conversation thread */
.sparring-thread{
  min-height:220px;
  max-height:420px;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  scroll-behavior:smooth;
  background:var(--white);
}
/* Empty state */
.sparring-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:32px 16px;
  gap:10px;
}
.sparring-empty-icon{font-size:28px;opacity:.25;margin-bottom:4px;}
.sparring-empty-text{font-size:.875rem;color:var(--subtle);line-height:1.6;max-width:320px;}

/* Message bubbles */
.msg{display:flex;flex-direction:column;gap:4px;max-width:82%;}
.msg-user{align-self:flex-end;align-items:flex-end;}
.msg-ai{align-self:flex-start;}
.msg-bubble{padding:11px 15px;border-radius:12px;font-size:.875rem;line-height:1.6;}
.msg-user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:3px;}
.msg-ai .msg-bubble{background:var(--ice2);border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:3px;}
.msg-meta{font-family:var(--mono);font-size:9.5px;color:var(--subtle);padding:0 4px;}
.msg-user .msg-meta{text-align:right;}

/* Typing indicator */
.typing-indicator{
  display:none;align-self:flex-start;
  padding:11px 16px;background:var(--ice2);border:1px solid var(--border);
  border-radius:12px;border-bottom-left-radius:3px;
}
.typing-indicator.visible{display:flex;align-items:center;gap:4px;}
.typing-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--muted);
  animation:typingBounce 1.1s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes typingBounce{0%,60%,100%{transform:none;opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* Input area */
.sparring-input-area{
  padding:14px 16px;
  border-top:1px solid var(--border);
  background:var(--ice2);
  display:flex;gap:10px;align-items:flex-end;
}
.sparring-textarea{
  flex:1;background:var(--white);
  border:1px solid var(--border);border-radius:9px;
  padding:10px 14px;
  color:var(--ink);font-family:var(--sans);font-size:.9rem;
  line-height:1.5;resize:none;outline:none;
  transition:border-color .18s;
  min-height:44px;max-height:120px;
  overflow-y:auto;
}
.sparring-textarea::placeholder{color:var(--subtle);}
.sparring-textarea:focus{border-color:var(--accent-rim);}
.sparring-send{
  width:42px;height:42px;border-radius:9px;
  /* Chat section's single accent anchor: the send button (the key action). */
  background:var(--accent);color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.sparring-send:hover{background:var(--accent-dark);}
.sparring-send:disabled{background:var(--subtle);cursor:not-allowed;opacity:.5;}
.sparring-send svg{width:16px;height:16px;}

/* Qualification nudge */
.sparring-nudge{
  display:none;
  margin:0 20px 16px;
  padding:14px 16px;
  background:var(--ice1);
  border:1px solid var(--accent-rim);
  border-radius:var(--r);
  display:none;align-items:center;gap:12px;flex-wrap:wrap;
}
.sparring-nudge.visible{display:flex;}
.sparring-nudge-text{font-size:.875rem;color:var(--ink);flex:1;line-height:1.5;}
.sparring-nudge-text strong{font-weight:500;}
.sparring-nudge-actions{display:flex;gap:8px;flex-wrap:wrap;}
.nudge-btn{
  padding:7px 14px;border-radius:6px;font-size:.8rem;font-weight:500;
  cursor:pointer;text-decoration:none;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;font-family:var(--sans);
}
.nudge-btn-primary{background:var(--accent);color:#fff;border:none;}
.nudge-btn-primary:hover{background:var(--accent-dark);}
.nudge-btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.nudge-btn-ghost:hover{color:var(--ink);border-color:var(--border-h);}

/* Reset button */
.sparring-reset{font-family:var(--mono);font-size:10px;color:var(--subtle);background:none;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .18s;padding:2px;}
.sparring-reset:hover{color:var(--muted);}

/* ══ CTA ══════════════════════════════════════════════════════════ */
.cta-section{padding:100px 0;text-align:center;position:relative;overflow:hidden;background:var(--ice2);}
@media(max-width:480px){.cta-section{padding:72px 0;}}
.cta-orb{position:absolute;width:500px;height:340px;background:radial-gradient(ellipse,rgba(44,125,255,.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.cta-content{position:relative;z-index:1;}
.cta-title{font-size:clamp(1.8rem,4.5vw,3.2rem);font-weight:300;letter-spacing:-.025em;margin-bottom:16px;line-height:1.12;color:var(--ink);}
.cta-title strong{font-weight:600;}
.cta-sub{font-size:1rem;color:var(--muted);font-weight:300;max-width:420px;margin:0 auto 32px;line-height:1.65;}
.cta-contact-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:14px;}
/* Level-3 accent detail: real contact links in accent with a fine hover-underline,
   reducing barrenness without competing with the section's filled CTA button. */
.cta-link{font-family:var(--mono);font-size:.8rem;color:var(--accent);text-decoration:none;padding:9px 14px;border:1px solid var(--border);border-radius:var(--r);transition:all .18s;background:var(--white);}
.cta-link:hover{color:var(--accent-dark);border-color:var(--accent-rim);text-decoration:underline;text-underline-offset:3px;}

/* ══ FOOTER ══════════════════════════════════════════════════════ */
footer{border-top:1px solid var(--border);padding:28px 0;position:relative;z-index:1;background:var(--white);}
.footer-inner{max-width:1080px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-size:1.05rem;font-weight:400;letter-spacing:-.02em;color:var(--ink);}
.footer-logo .s{color:var(--accent);font-weight:700;}
.footer-copy{font-size:.75rem;color:var(--subtle);}
@media(max-width:480px){.footer-inner{flex-direction:column;align-items:flex-start;gap:10px;}}

/* ══ PATTERN GRID ════════════════════════════════════════════════ */
.pattern-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  margin-top:40px;
}
@media(max-width:860px){.pattern-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.pattern-grid{grid-template-columns:1fr;}}
.pattern-card{
  background:var(--white);
  padding:26px 24px;
  transition:background .18s;
}
.pattern-card:hover{background:var(--ice1);}
.pattern-title{
  font-size:.95rem;
  font-weight:500;
  color:var(--ink);
  margin-bottom:8px;
  line-height:1.3;
}
.pattern-obs{
  font-size:.825rem;
  color:var(--muted);
  line-height:1.6;
  font-weight:300;
}

/* ══ SCROLL REVEAL ════════════════════════════════════════════════ */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease;}
.reveal.visible{opacity:1;transform:none;}

/* Wordmark "S": bold accent everywhere it appears in text (bare spans). */
.s{color:var(--accent);font-weight:700;}
/* Specific eyebrow labels + prompt label requested in bold accent. */
.label-accent{color:var(--accent);font-weight:700;}
/* Section eyebrow labels "Waar het misloopt" / "Herken jij dit?": +2px, bold. */
.label.label-accent{font-size:12.5px;}
</style>

<body>

<!-- OPEN (pre-login) DISCOVERY LAYER — canon: leidt alleen het gesprek in; geen website.
     Stopt na de zes chips + de "powered by Atlas"-footer. Geen nav/hero/contact/over-ons/navy. -->
<main class="open" role="main">
  <div class="open-inner">

    <header class="open-brand">
      <div class="wordmark">digi<span class="s">S</span>tiel</div>
      <p class="tagline">__OPEN_TAGLINE__</p>
    </header>

    <div class="sparring-workspace" id="sparringWorkspace">

      <div class="sparring-header">
        <div class="sparring-header-left">
          <div class="sparring-ai-dot" aria-hidden="true"></div>
          <div class="ai-disclosure">__OPEN_DISCLOSURE__</div>
        </div>
        <!-- Reset (pre-login scope): wist ALLEEN het lopende gesprek. Zie de reset-handler-comment. -->
        <button class="sparring-reset" id="sparringReset" aria-label="Opnieuw beginnen">&#8635;&nbsp;__OPEN_RESET__</button>
      </div>
      <!-- Category B: retention disclosure, runtime uit data.marketConfig (be=10 / nl=7). -->
      <div id="retentionDisclosure" class="ret-disclosure" style="display:none;"></div>

      <div class="sparring-prompts" id="sparringPrompts" role="region" aria-label="Herkenbare situaties">
        <div class="sparring-chips" role="list">
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_1__</button>
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_2__</button>
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_3__</button>
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_4__</button>
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_5__</button>
          <button class="sparring-chip" role="listitem">__OPEN_CHIP_6__</button>
        </div>
      </div>

      <div class="sparring-thread" id="sparringThread" role="log" aria-live="polite" aria-label="Gesprek">
        <div class="sparring-empty" id="sparringEmpty">
          <div class="sparring-empty-text">Kies iets hierboven dat herkenbaar klinkt, of typ gewoon wat er speelt. Er is geen verkeerd antwoord.</div>
        </div>
        <div class="typing-indicator" id="typingIndicator" aria-hidden="true">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="sparring-input-area">
        <textarea
          class="sparring-textarea"
          id="sparringInput"
          placeholder="__OPEN_PLACEHOLDER__"
          rows="1"
          aria-label="Jouw bericht"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button class="sparring-send" id="sparringSend" disabled aria-label="Verstuur bericht">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 8h12M9 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div>

    <footer class="open-footer" role="contentinfo">__OPEN_FOOTER__</footer>

  </div>
</main>

<script>
'use strict';

// Open layer is a minimal discovery page: no theme toggle, no nav, no scroll-reveal,
// no sim-timer and no smooth-scroll — those belonged to the removed marketing sections.

// ══ AI SPARRING ENGINE ═══════════════════════════════════════════
// Architecture: conversation history kept in JS array → sent to /api/analyse
// on each turn. /api/analyse proxies to Claude server-side (key never exposed).
// The system prompt lives server-side in netlify/functions/analyse.js so it is
// not exposed in the page source. After a nudge trigger, the CTA is shown.

let conversationHistory = [];
let messageCount = 0;
let isLoading = false;
let sessionId = null; // Held across turns; set by the server on the first reply.
// Market surface the Function reports (Category B, runtime). marketLocale is the
// locale string; marketConfig carries { lang, locale, retention } for rendering.
let marketLocale = null;
let marketConfig = null;

const thread      = document.getElementById('sparringThread');
const emptyState  = document.getElementById('sparringEmpty');
const typingInd   = document.getElementById('typingIndicator');
const input       = document.getElementById('sparringInput');
const sendBtn     = document.getElementById('sparringSend');
const workspace   = document.getElementById('sparringWorkspace');
const resetBtn    = document.getElementById('sparringReset');
const prompts     = document.getElementById('sparringPrompts');

// Auto-resize textarea
input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || isLoading;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Send on Enter (Shift+Enter = newline)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Chip clicks
document.querySelectorAll('.sparring-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    if (isLoading) return;
    input.value = chip.textContent.trim();
    input.dispatchEvent(new Event('input'));
    sendMessage();
  });
});

// Reset (pre-login scope). HARD RULE: this button wipes ONLY the running conversation —
// it starts a fresh session (new session_id → new Conversations row in Airtable). It is NOT
// the wallet reset. Post-login the wallet reset means "conversation gone, knowledge persistent";
// that semantic must NOT be copied here, and this pre-login reset must NOT be copied into the wallet.
resetBtn.addEventListener('click', () => {
  conversationHistory = [];
  messageCount = 0;
  sessionId = null; // New conversation → new Conversations row.
  // Clear thread, keep empty state + typing indicator
  Array.from(thread.children).forEach(el => {
    if (el !== emptyState && el !== typingInd) el.remove();
  });
  emptyState.style.display = '';
  if (prompts) prompts.style.display = ''; // reset = fresh cold start → chips back
  workspace.classList.remove('active');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
});

function appendMessage(text, role) {
  if (emptyState) emptyState.style.display = 'none';
  workspace.classList.add('active');

  const isUser = role === 'user';
  // Single mechanism for both triggers: the moment the first user message enters
  // the conversation (via chip-click or typed input — both route through here),
  // hide the starter chips. This is one-way: appendMessage never re-shows them,
  // so they stay gone for the rest of the conversation. Not market-dependent.
  if (isUser && prompts) prompts.style.display = 'none';
  const msg  = document.createElement('div');
  msg.className = `msg msg-${isUser ? 'user' : 'ai'}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  // Render newlines, sanitise HTML
  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  // Static strings only (no user input) — safe to set innerHTML for the wordmark "S".
  if (isUser) { meta.textContent = 'Jij'; }
  else { meta.innerHTML = 'digi<span class="s">S</span>tiel'; }

  msg.appendChild(bubble);
  msg.appendChild(meta);
  thread.insertBefore(msg, typingInd);
  thread.scrollTop = thread.scrollHeight;
  return msg;
}

function setTyping(visible) {
  typingInd.classList.toggle('visible', visible);
  if (visible) thread.scrollTop = thread.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  isLoading = true;

  appendMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
  messageCount++;

  setTyping(true);

  try {
    const res = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        _history: conversationHistory.slice(0, -1),
        _message: text,
        session_id: sessionId
      })
    });

    setTyping(false);

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    // Hold the session id the server assigns so the whole conversation
    // logs to one Conversations row.
    if (data.session_id) sessionId = data.session_id;
    // Category B (runtime): apply the market the Function reports to the in-app
    // surface. data.market (locale string) stays for compat; data.marketConfig
    // carries the values we render during interaction.
    if (data.market) {
      marketLocale = data.market;
      document.body.dataset.market = marketLocale;
    }
    if (data.marketConfig) {
      marketConfig = data.marketConfig;
      // Retention disclosure differs per market (BE 10 jaar / NL 7 jaar).
      const rd = document.getElementById('retentionDisclosure');
      if (rd && marketConfig.retention) {
        rd.textContent = `Gespreksgegevens worden ${marketConfig.retention} jaar bewaard.`;
        rd.style.display = '';
      }
    }
    let reply = (data.reply || data.text || 'Er ging iets mis. Probeer opnieuw.').trim();
    // Strip the server nudge token if present — the open layer shows NO contact CTA (canon: geen
    // contactgegevens). This is display-only; it does not touch the logging payload/history.
    reply = reply.replace('[NUDGE]', '').trim();

    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage(reply, 'ai');

  } catch(err) {
    setTyping(false);
    appendMessage('ERROR: ' + err.message, 'ai');
  }

  isLoading = false;
  // Re-enable send — user may want to rephrase after an error
  sendBtn.disabled = false;
  input.focus();
}

</script>
</body>
</html>
