[build]
  functions = "netlify/functions"
  publish   = "."
  # Category A: inject per-site MARKET values into the static crawler-critical
  # surface (html lang, og:locale, canonical/og/sitemap/robots domain) before
  # publish. Each Netlify site supplies its own MARKET env var.
  # build-market.js: per-site MARKET injection. build-wallet.js: snapshot the frozen wallet data
  # layer (ViewModel output) to wallet-data.json for the static wallet UI to consume read-only.
  command   = "node scripts/build-market.js && node scripts/build-wallet.js"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control              = "no-store"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# www -> apex 301 is DELIBERATELY not in code. It is handled by Netlify per site,
# via the site's primary-domain setting (set when the custom domain is connected):
# Netlify auto-redirects the non-primary host (www) to the primary apex. Each site
# (be/nl/com) does this with its own domain, so there is no redirect rule — and no
# hardcoded domain — here. Do not add a static www->apex rule; it would double up.
