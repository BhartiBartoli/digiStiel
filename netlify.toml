[build]
  functions = "netlify/functions"
  publish   = "."
  # Category A: inject per-site MARKET values into the static crawler-critical
  # surface (html lang, og:locale, canonical/og/sitemap/robots domain) before
  # publish. Each Netlify site supplies its own MARKET env var.
  command   = "node scripts/build-market.js"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control              = "no-store"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# www -> apex 301 is market-driven and NOT a static rule here: scripts/build-market.js
# generates a per-site _redirects file at build time, deriving the apex domain from
# the same site domain (process.env.URL) used for the canonical. So be -> .be,
# nl -> .nl, com -> .com without hardcoding any domain in this config.
