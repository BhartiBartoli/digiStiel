[build]
  functions = "netlify/functions"
  publish   = "."
  # Category A: inject per-site MARKET values into the static crawler-critical
  # surface (html lang, og:locale, canonical/og/sitemap/robots domain) before
  # publish. Each Netlify site supplies its own MARKET env var.
  command   = "node scripts/build-market.js"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control              = "no-store"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SESSION 2 (market-driven): each Netlify site needs its own www -> apex
# redirect using its own domain (be: digistiel.be, nl: digistiel.nl).
# The hardcoded .be redirect was removed here to keep static config
# market-neutral; re-add it per-site/market-driven in session 2.
